<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or "AI Пульт продаж" }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">AI</div>
      <div>
        <strong>Пульт продаж</strong>
        <span>ручной режим</span>
      </div>
    </div>

    <nav>
      <a href="/">Главная</a>
      <a href="/next-lead" class="nav-hot">Следующий лид</a>
      <a href="/leads">Очередь</a>
      <a href="/scanner">Сканер</a>
      <a href="/import-csv">Импорт CSV</a>
      <a href="http://5.129.200.18:8080/demo-48h/" target="_blank">Демо 48ч</a>
    </nav>

    <div class="side-note">
      Цель дня: 10 контактов → 3 разговора → 1 КП.
    </div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <script>
    function copyText(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const text = el.innerText || el.value || "";
      navigator.clipboard.writeText(text);
      const btns = document.querySelectorAll("[data-copy-target='" + id + "']");
      btns.forEach(btn => {
        const old = btn.innerText;
        btn.innerText = "Скопировано";
        setTimeout(() => btn.innerText = old, 900);
      });
    }
  </script>
</body>
</html>
